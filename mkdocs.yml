site_name: Vist Archive
site_url: https://vist233.github.io/blog/
site_author: Vist
site_description: >-
  Notes on agent engineering, backend systems, product judgment, and quiet design.

copyright: Copyright &copy; 2025 Vist

theme:
  name: material
  custom_dir: overrides
  features:
    - content.code.copy
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest
  language: en
  font:
    text: Inter
    code: Roboto Mono
  logo: assets/logo.png
  favicon: assets/logo.png

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - rss:
      match_path: ".*"
      date_from_meta:
        as_creation: date
      categories:
        - tags

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  homepage: /
